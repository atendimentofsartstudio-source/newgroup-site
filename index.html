<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acesso Exclusivo | New Group</title>

<link rel="stylesheet" href="assets/css/login.css">

</head>

<body>

<div class="background"></div>

<div class="login-container">

    <img src="assets/images/logo-new-flux-site.png" class="logo" alt="New Group">

    <span class="badge">
        APRESENTAÇÃO EXCLUSIVA
    </span>

    <h1>
        Bem-vindo.
    </h1>

    <p>

        Este ambiente foi preparado exclusivamente para apresentação da nova plataforma institucional da New Group.

    </p>

    <form id="loginForm">

        <input

            id="password"

            type="password"

            placeholder="Digite a senha"

            autocomplete="off"

        >

        <button>

            ACESSAR PROJETO

        </button>

    </form>

    <small>

        Desenvolvido por FS Art Studio

    </small>

</div>

<script src="assets/js/login.js"></script>

</body>
</html>
